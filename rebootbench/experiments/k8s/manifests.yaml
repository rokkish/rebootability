apiVersion: apps/v1
kind: Deployment
metadata:
  name: rebootbench-tiny
  labels: { app: rebootbench-tiny }
spec:
  replicas: 1
  selector:
    matchLabels: { app: rebootbench-tiny }
  template:
    metadata:
      labels: { app: rebootbench-tiny }
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: tinyserver
          image: rebootbench/tinyserver:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 18080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":18080"
          readinessProbe:
            httpGet:
              path: /
              port: 18080
            initialDelaySeconds: 0
            periodSeconds: 1
            failureThreshold: 1
            successThreshold: 1
            timeoutSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: rebootbench-tiny
spec:
  type: NodePort
  selector: { app: rebootbench-tiny }
  ports:
    - port: 18080
      targetPort: 18080
      nodePort: 30080
      name: http
